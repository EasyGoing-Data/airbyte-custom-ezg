documentationUrl: https://frankfurter.dev
connectionSpecification:
  $schema: http://json-schema.org/draft-07/schema#
  title: Exchange Rate (Frankfurter) Source Spec
  type: object
  required:
    - base
  additionalProperties: true
  properties:
    base:
      title: Base Currency
      description: Đồng tiền gốc; mọi tỷ giá tính theo 1 đơn vị base. Mặc định USD.
      type: string
      default: USD
      pattern: "^[A-Za-z]{3}$"
      order: 0
    start_date:
      title: Start Date (YYYY-MM-DD)
      description: Ngày bắt đầu backfill. Để trống = mặc định 2024-01-01.
      type: ["null", "string"]
      pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
      examples: ["2024-01-01"]
      order: 1
    symbols:
      title: Target Currencies (optional)
      description: Danh sách đồng tiền đích, phân tách dấu phẩy (vd HKD,EUR,VND). Để trống = lấy tất cả.
      type: ["null", "string"]
      examples: ["HKD,EUR,VND"]
      order: 2
