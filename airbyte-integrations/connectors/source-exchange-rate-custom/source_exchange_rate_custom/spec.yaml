documentationUrl: https://docs.openexchangerates.org
connectionSpecification:
  $schema: http://json-schema.org/draft-07/schema#
  title: Open Exchange Rates Spec
  type: object
  required:
    - app_id
  additionalProperties: false
  properties:
    app_id:
      title: App ID
      description: Your Open Exchange Rates App ID (free tier supported).
      type: string
      airbyte_secret: true
      order: 0
    start_date:
      title: Start Date
      description: "Start date for historical backfill (YYYY-MM-DD). Default: 2024-12-31."
      type: ["null", "string"]
      pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
      default: "2024-12-31"
      order: 1
    lookback_days:
      title: Lookback Days
      description: "Number of recent days to always re-fetch on each sync (overwrite). Default: 3."
      type: ["null", "integer"]
      default: 3
      minimum: 1
      maximum: 30
      order: 2
